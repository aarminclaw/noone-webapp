<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis — Arcade</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
    pointer-events: none;
    z-index: 20;
  }

  body::after {
    content: '';
    position: fixed;
    inset: -40px;
    background-image:
      linear-gradient(rgba(0,255,65,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,65,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: grid 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes grid { to { background-position: 40px 40px; } }

  .wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px;
  }

  .title {
    font-size: 1.8rem;
    letter-spacing: 12px;
    color: #00ff41;
    text-shadow: 0 0 15px #00ff41, 0 0 40px #00ff4166;
    animation: flicker 5s ease-in-out infinite;
  }
  @keyframes flicker {
    0%,93%,100% { opacity:1; }
    94% { opacity:.7; }
    95% { opacity:1; }
    96% { opacity:.4; }
    97% { opacity:1; }
  }

  canvas {
    border: 1px solid #1a4a1a;
    box-shadow: 0 0 30px #00ff4120;
    display: block;
  }

  .scores {
    display: flex;
    gap: 60px;
    color: #00ff41;
    font-size: 1rem;
    letter-spacing: 4px;
  }

  .score-label { color: #1a6627; font-size: 0.65rem; letter-spacing: 3px; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
  }

  .msg {
    color: #00ff41;
    font-size: 1.1rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 12px #00ff41;
  }

  .sub {
    color: #1a6627;
    font-size: 0.65rem;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .btn {
    margin-top: 8px;
    padding: 10px 32px;
    border: 1px solid #00ff4166;
    background: transparent;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .btn:hover { background: #00ff4115; box-shadow: 0 0 16px #00ff4140; }

  .back {
    color: #1a4a1a;
    font-size: 0.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.2s;
  }
  .back:hover { color: #00ff41; }

  .controls {
    color: #1a4a1a;
    font-size: 0.58rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">TENNIS</div>

  <div class="scores">
    <div>
      <div class="score-label">PLAYER</div>
      <div id="score-p">0</div>
    </div>
    <div>
      <div class="score-label">CPU</div>
      <div id="score-cpu">0</div>
    </div>
  </div>

  <div style="position:relative;">
    <canvas id="c" width="700" height="460"></canvas>
    <div id="overlay">
      <div class="msg" id="msg">TENNIS</div>
      <div class="sub" id="sub">First to 7 wins</div>
      <button class="btn" id="startBtn">▶ &nbsp; START</button>
    </div>
  </div>

  <div class="controls">W / S — move &nbsp;|&nbsp; ball speeds up each rally</div>
  <a href="index.html" class="back">← Arcade</a>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const WIN_SCORE = 7;
const PAD_W = 12, PAD_H = 80, PAD_MARGIN = 20;
const BALL_R = 7;
const CPU_SPEED = 4.2;

const GREEN = '#00ff41';
const DIM = '#0a2a0a';
const MID = '#122212';

let state = 'idle'; // idle | playing | paused | over
let scoreP = 0, scoreCPU = 0;

let player, cpu, ball;

function reset(serveDir = 1) {
  player = { x: PAD_MARGIN, y: H / 2 - PAD_H / 2, dy: 0 };
  cpu    = { x: W - PAD_MARGIN - PAD_W, y: H / 2 - PAD_H / 2 };
  const angle = (Math.random() * 0.6 - 0.3); // radians, slight angle
  const spd = 5;
  ball = {
    x: W / 2, y: H / 2,
    vx: Math.cos(angle) * spd * serveDir,
    vy: Math.sin(angle) * spd,
    speed: spd,
    hits: 0,
  };
}

// Input
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// Overlay helpers
const overlay  = document.getElementById('overlay');
const msgEl    = document.getElementById('msg');
const subEl    = document.getElementById('sub');
const startBtn = document.getElementById('startBtn');
const scoreP_el   = document.getElementById('score-p');
const scoreCPU_el = document.getElementById('score-cpu');

function showOverlay(msg, sub, btnText) {
  msgEl.textContent = msg;
  subEl.textContent = sub;
  startBtn.textContent = btnText;
  overlay.style.display = 'flex';
}

function hideOverlay() {
  overlay.style.display = 'none';
}

startBtn.addEventListener('click', () => {
  if (state === 'idle' || state === 'over') {
    scoreP = 0; scoreCPU = 0;
    updateScoreDisplay();
    reset(1);
    state = 'playing';
    hideOverlay();
  }
});

function updateScoreDisplay() {
  scoreP_el.textContent = scoreP;
  scoreCPU_el.textContent = scoreCPU;
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function update() {
  if (state !== 'playing') return;

  // Player movement
  const PLAYER_SPD = 6;
  if (keys['w'] || keys['W'] || keys['ArrowUp'])    player.y -= PLAYER_SPD;
  if (keys['s'] || keys['S'] || keys['ArrowDown'])  player.y += PLAYER_SPD;
  player.y = clamp(player.y, 0, H - PAD_H);

  // CPU AI — tracks ball with slight lag
  const cpuCenter = cpu.y + PAD_H / 2;
  const diff = ball.y - cpuCenter;
  const move = clamp(diff, -CPU_SPEED, CPU_SPEED);
  cpu.y = clamp(cpu.y + move, 0, H - PAD_H);

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Top / bottom wall bounce
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }
  if (ball.y + BALL_R >= H) { ball.y = H - BALL_R; ball.vy = -Math.abs(ball.vy); }

  // Paddle collision — player
  if (
    ball.vx < 0 &&
    ball.x - BALL_R <= player.x + PAD_W &&
    ball.x - BALL_R >= player.x &&
    ball.y >= player.y && ball.y <= player.y + PAD_H
  ) {
    ball.hits++;
    const newSpeed = 5 + ball.hits * 0.3;
    const relHit = (ball.y - (player.y + PAD_H / 2)) / (PAD_H / 2); // -1 to 1
    const bounceAngle = relHit * 0.8;
    ball.vx =  Math.cos(bounceAngle) * newSpeed;
    ball.vy =  Math.sin(bounceAngle) * newSpeed;
    ball.x = player.x + PAD_W + BALL_R;
  }

  // Paddle collision — CPU
  if (
    ball.vx > 0 &&
    ball.x + BALL_R >= cpu.x &&
    ball.x + BALL_R <= cpu.x + PAD_W &&
    ball.y >= cpu.y && ball.y <= cpu.y + PAD_H
  ) {
    ball.hits++;
    const newSpeed = 5 + ball.hits * 0.3;
    const relHit = (ball.y - (cpu.y + PAD_H / 2)) / (PAD_H / 2);
    const bounceAngle = relHit * 0.8;
    ball.vx = -Math.cos(bounceAngle) * newSpeed;
    ball.vy =  Math.sin(bounceAngle) * newSpeed;
    ball.x = cpu.x - BALL_R;
  }

  // Scoring
  if (ball.x + BALL_R < 0) {
    // CPU scores
    scoreCPU++;
    updateScoreDisplay();
    if (scoreCPU >= WIN_SCORE) { endGame('CPU WINS'); return; }
    reset(-1);
  } else if (ball.x - BALL_R > W) {
    // Player scores
    scoreP++;
    updateScoreDisplay();
    if (scoreP >= WIN_SCORE) { endGame('YOU WIN'); return; }
    reset(1);
  }
}

function endGame(msg) {
  state = 'over';
  showOverlay(msg, `${scoreP} — ${scoreCPU}`, '▶ &nbsp; PLAY AGAIN');
}

// Draw helpers
function drawNet() {
  const segH = 16, gap = 8;
  ctx.fillStyle = MID;
  for (let y = 0; y < H; y += segH + gap) {
    ctx.fillRect(W / 2 - 1, y, 2, segH);
  }
}

function drawPad(pad, lit) {
  // Glow
  ctx.shadowColor = GREEN;
  ctx.shadowBlur = lit ? 18 : 6;
  ctx.fillStyle = lit ? GREEN : '#00aa28';
  ctx.fillRect(pad.x, pad.y, PAD_W, PAD_H);
  ctx.shadowBlur = 0;
}

function drawBall() {
  ctx.shadowColor = GREEN;
  ctx.shadowBlur = 18;
  ctx.fillStyle = GREEN;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function draw() {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  // Court lines
  ctx.strokeStyle = DIM;
  ctx.lineWidth = 1;
  ctx.strokeRect(1, 1, W - 2, H - 2);

  drawNet();

  if (state === 'playing' || state === 'over') {
    drawPad(player, true);
    drawPad(cpu, false);
    drawBall();
  } else if (state === 'idle') {
    // Draw static paddles in starting positions for preview
    const pp = { x: PAD_MARGIN, y: H / 2 - PAD_H / 2 };
    const cp = { x: W - PAD_MARGIN - PAD_W, y: H / 2 - PAD_H / 2 };
    drawPad(pp, true);
    drawPad(cp, false);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
reset(1);
showOverlay('TENNIS', 'First to 7 wins', '▶ &nbsp; START');
loop();
</script>
</body>
</html>
